name: Build & Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: healthvia-beta
  REGION: europe-west1
  REPO: healthvia-repo
  IMAGE: healthvia-admin
  SERVICE: healthvia-admin

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build -t europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }} \
                       -t europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:latest .

      - name: Push Docker image
        run: |
          docker push europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          docker push europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          flags: |
            --port=3000
            --memory=1Gi
            --cpu=1
            --min-instances=0
            --max-instances=3
            --timeout=300
            --concurrency=80
            --cpu-boost
            --allow-unauthenticated
          env_vars: |
            NODE_ENV=production
            GCS_BUCKET=healthvia-media
            GCP_PROJECT_ID=healthvia-beta
            BACKEND_API_URL=https://api.healthviatech.website
          secrets: |
            DATABASE_URI=MONGODB_URI:latest
            PAYLOAD_SECRET=PAYLOAD_SECRET:latest
            PAYLOAD_SYNC_API_KEY=PAYLOAD_SYNC_API_KEY:latest
